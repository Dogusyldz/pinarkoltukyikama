<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pınar Halı Yıkama</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* Arka plan: Blur efektinin belli olması için hafif desenli veya renkli bir zemin */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sihirli Kısım: Glassmorphism (Buzlu Cam) ve Gölge Efekti */
        .glass-card {
            background: rgba(255, 255, 255, 0.65); /* Yarı şeffaf beyaz zemin */
            backdrop-filter: blur(16px); /* Arka planı bulanıklaştırma (BLUR) */
            -webkit-backdrop-filter: blur(16px); /* Safari desteği */
            border: 1px solid rgba(255, 255, 255, 0.8); /* İnce beyaz çerçeve */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 
                        0 5px 15px rgba(0, 0, 0, 0.05); /* Derin ve yumuşak GÖLGE */
            border-radius: 32px;
            padding: 60px 40px;
            max-width: 650px;
            text-align: center;
            margin: 20px;
            transition: transform 0.4s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px); /* Üzerine gelince hafif yukarı kalkar */
        }

        /* Etiket / Üst Slogan */
        .badge {
            display: inline-block;
            background: rgba(21, 128, 61, 0.1);
            color: #15803d;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Ana Başlık */
        .title {
            color: #064e3b;
            font-size: 46px;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 20px 0;
        }

        .title span {
            color: #15803d;
        }

        /* Alt Metin / Slogan (Bahsettiğin gri ton: #444746) */
        .slogan {
            color: #444746;
            font-size: 18px;
            line-height: 1.6;
            margin: 0 auto 40px auto;
            font-weight: 400;
            max-width: 500px;
        }

        /* Butonlar */
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #16a34a;
            color: white;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.3);
        }

        .btn-primary:hover {
            background-color: #15803d;
            box-shadow: 0 15px 25px rgba(22, 163, 74, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: #444746;
            border: 2px solid #c4c7c5;
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            border-color: #444746;
            color: #1e293b;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="badge">Van'ın Doğal Hijyen Merkezi</div>
        
        <h1 class="title">Halılarınızda <br> <span>PINAR</span> Dokusu</h1>
        
        <p class="slogan">
            Doğaya zarar vermeyen özel bitkisel şampuanlarımızla, halılarınızda gerçek temizliğin ve ferahlığın kokusunu hissedin.
        </p>
        
        <div class="btn-container">
            <a href="https://wa.me/905461253393" class="btn btn-primary">Hemen Randevu Al</a>
            <a href="#hizmetler" class="btn btn-secondary">Hizmetleri İncele</a>
        </div>
    </div>

</body>
</html>
