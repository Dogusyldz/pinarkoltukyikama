<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vannetkoltuk | Profesyonel Yerinde Yıkama</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.05);
            border-radius: 40px;
            padding: 60px;
            max-width: 600px;
            text-align: center;
            margin: 20px;
        }

        .badge { background: #dcfce7; color: #166534; padding: 8px 20px; border-radius: 50px; font-weight: 800; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }
        
        h1 { color: #1e293b; font-size: 48px; font-weight: 900; margin: 0 0 20px 0; }
        h1 span { color: #16a34a; }
        
        .slogan { color: #444746; font-size: 18px; line-height: 1.6; margin-bottom: 40px; }
        
        .btn { padding: 18px 36px; border-radius: 16px; text-decoration: none; font-weight: 800; font-size: 16px; transition: all 0.3s ease; display: inline-block; cursor: pointer; }
        .btn-primary { background-color: #16a34a; color: white; box-shadow: 0 10px 20px rgba(22, 163, 74, 0.3); }
        .btn-primary:hover { background-color: #15803d; transform: translateY(-3px); }
        
        .footer-text { margin-top: 30px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="badge">Van'ın Hijyen Uzmanı</div>
        <h1>vannet<span>koltuk</span></h1>
        <p class="slogan">
            Evinizin konforunda, profesyonel dokunuş. Koltuk, yatak ve baza temizliğinde Van'ın en güvenilir adresi. Hijyeni şansa bırakmayın.
        </p>
        
        <a href="https://wa.me/905461253393" class="btn btn-primary">HEMEN RANDEVU AL</a>
        
        <div class="footer-text">
            Saniyeler içinde randevu oluşturun, temizliğin keyfini çıkarın.
        </div>
    </div>

</body>
</html>
